  "/>

  <!-- ── CAR MAIN BODY (cream) ── -->
  <path fill="#F0EAE0" d="
    M 22,220
    L 22,204 L 26,190 L 34,177
    L 48,167 L 68,159 L 92,152
    L 120,146 L 152,141 L 180,138
    L 200,137
    L 220,138 L 248,141 L 280,146
    L 308,152 L 332,159 L 352,167
    L 366,177 L 374,190 L 378,204 L 378,220
    Z
  "/>

  <!-- ── FRONT BUMPER (navy) ── -->
  <rect x="22" y="212" width="356" height="10" rx="4" fill="#1C2E5A"/>

  <!-- ── LEFT HEADLIGHT housing (navy) ── -->
  <path fill="#1C2E5A" d="M 30,220 L 30,186 L 48,172 L 76,169 L 88,181 L 88,220 Z"/>
  <!-- Left headlight lens (cream) -->
  <path fill="#F5F1EB" d="M 37,217 L 37,189 L 51,177 L 74,174 L 82,184 L 82,217 Z"/>
  <!-- Left DRL accent (gold) -->
  <rect x="30" y="186" width="6" height="34" rx="3" fill="#D4A820"/>

  <!-- ── RIGHT HEADLIGHT housing (navy) ── -->
  <path fill="#1C2E5A" d="M 370,220 L 370,186 L 352,172 L 324,169 L 312,181 L 312,220 Z"/>
  <!-- Right headlight lens (cream) -->
  <path fill="#F5F1EB" d="M 363,217 L 363,189 L 349,177 L 326,174 L 318,184 L 318,217 Z"/>
  <!-- Right DRL accent (gold) -->
  <rect x="364" y="186" width="6" height="34" rx="3" fill="#D4A820"/>

  <!-- ── CENTER GRILLE (navy) ── -->
  <rect x="96" y="196" width="208" height="18" rx="4" fill="#1C2E5A"/>
  <!-- Grille horizontal bars -->
  <line x1="96" y1="203" x2="304" y2="203" stroke="#F0EAE0" stroke-width="1" opacity="0.3"/>
  <line x1="96" y1="209" x2="304" y2="209" stroke="#F0EAE0" stroke-width="1" opacity="0.3"/>
  <!-- Grille vertical dividers -->
  <line x1="130" y1="196" x2="130" y2="214" stroke="#F0EAE0" stroke-width="1" opacity="0.22"/>
  <line x1="162" y1="196" x2="162" y2="214" stroke="#F0EAE0" stroke-width="1" opacity="0.22"/>
  <line x1="200" y1="196" x2="200" y2="214" stroke="#F0EAE0" stroke-width="1.5" opacity="0.4"/>
  <line x1="238" y1="196" x2="238" y2="214" stroke="#F0EAE0" stroke-width="1" opacity="0.22"/>
  <line x1="270" y1="196" x2="270" y2="214" stroke="#F0EAE0" stroke-width="1" opacity="0.22"/>

  <!-- ── CENTER BADGE ── -->
  <circle cx="200" cy="205" r="12" fill="#F0EAE0"/>
  <circle cx="200" cy="205" r="7.5" fill="#1C2E5A"/>
  <circle cx="200" cy="205" r="3.5" fill="#F0EAE0"/>

  <!-- ── HOOD LINE ── -->
  <line x1="96" y1="195" x2="304" y2="195" stroke="#1C2E5A" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- ── WHEEL ARCH CUTOUTS (navy ellipses at bottom corners) ── -->
  <ellipse cx="80" cy="220" rx="46" ry="12" fill="#1C2E5A"/>
  <ellipse cx="320" cy="220" rx="46" ry="12" fill="#1C2E5A"/>

  <!-- ── TIRES (dark circles inside arches) ── -->
  <circle cx="80" cy="228" r="17" fill="#0E1A35"/>
  <circle cx="80" cy="228" r="9" fill="#1C2E5A"/>
  <circle cx="80" cy="228" r="4" fill="#0E1A35"/>
  <circle cx="320" cy="228" r="17" fill="#0E1A35"/>
  <circle cx="320" cy="228" r="9" fill="#1C2E5A"/>
  <circle cx="320" cy="228" r="4" fill="#0E1A35"/>

  <!-- ── THIN DIVIDER ── -->
  <line x1="60" y1="258" x2="340" y2="258" stroke="#1C2E5A" stroke-width="1" opacity="0.18"/>

  <!-- ── "EMPIRE" ── -->
  <text x="200" y="308"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold"
        font-size="68"
        fill="#1C2E5A"
        text-anchor="middle"
        letter-spacing="6">EMPIRE</text>

  <!-- ── "AUTO RENTALS" ── -->
  <text x="200" y="342"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="21"
        fill="#1C2E5A"
        text-anchor="middle"
        letter-spacing="10">AUTO RENTALS</text>

  <!-- ── Tagline ── -->
  <text x="200" y="376"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="15"
        fill="#1C2E5A"
        text-anchor="middle"
        opacity="0.62">Drive the Empire State Your Way.</text>

</svg>
