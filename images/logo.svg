    L 36,116 L 36,128 L 44,128
    L 44,106 L 50,106 L 50,94 L 55,94 L 55,80
    L 59,80 L 59,66 L 63,66 L 63,50
    L 65,38 L 67,24 L 68,14
    L 69,24 L 71,38 L 73,50
    L 77,66 L 77,80 L 81,80 L 81,94
    L 86,94 L 86,106 L 92,106
    L 92,118 L 104,118 L 104,130 L 116,130 L 116,118
    L 128,118 L 128,130 L 140,130 L 140,118
    L 154,118 L 154,128 L 166,128 L 166,118 L 178,118
    L 178,130 L 192,130 L 192,118 L 208,118 L 208,130
    L 222,130 L 222,118 L 234,118 L 234,130 L 246,130
    L 246,118 L 258,118 L 258,128 L 270,128 L 270,118
    L 282,118 L 282,110
    L 287,98 L 293,86 L 297,74 L 301,62
    L 304,50 L 306,36 L 307,22
    L 308,36 L 310,50 L 313,62
    L 317,74 L 321,86 L 327,98
    L 333,110 L 333,120
    L 344,120 L 344,110 L 354,110 L 354,122
    L 362,122 L 362,132 L 372,132 L 372,142
    L 390,142 L 390,162
